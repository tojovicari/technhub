version: '3.9'
services:
  postgres:
    image: postgres:16-alpine
    container_name: cto_ai_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: cto_ai
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - '5432:5432'
    volumes:
      - pgdata:/var/lib/postgresql/data

volumes:
  pgdata:
