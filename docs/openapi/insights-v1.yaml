openapi: "3.1.0"
info:
  title: moasy.tech - Insights API
  version: "1.0.0"
  description: |
    Sprint A, Sprint B e Sprint C do modulo de Insights por Resource Group e Squad.
    Inclui overview operacional, insights de incidentes, confianca de planejamento, qualidade de backlog,
    trends, freshness, recompute assíncrono e contratos de configuração/consumo por squad.

servers:
  - url: /api/v1

tags:
  - name: Insights
    description: Insights operacionais por Resource Group e Squad

security:
  - BearerAuth: []

components:
  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  schemas:
    ApiResponse:
      type: object
      properties:
        data: {}
        meta: { type: object }
        error: { nullable: true }

    ApiError:
      type: object
      properties:
        data: { nullable: true }
        meta: { type: object }
        error:
          type: object
          properties:
            code: { type: string }
            message: { type: string }
            details: { type: object, additionalProperties: true }

    ResourceGroupRef:
      type: object
      required: [id, key, name]
      properties:
        id: { type: string, format: uuid }
        key: { type: string }
        name: { type: string }

    InsightsCalculationContext:
      type: object
      required:
        [
          policy_source,
          policy_id,
          policy_version,
          delivery_sources_used,
          aggregation_mode,
          state_mapping_hash,
          fallback_used,
          warnings,
        ]
      properties:
        policy_source:
          { type: string, enum: [resource_group, tenant_default, legacy] }
        policy_id: { type: string, format: uuid, nullable: true }
        policy_version: { type: integer, minimum: 1, nullable: true }
        delivery_sources_used:
          type: array
          items: { type: string, enum: [task_done, pr_merged, release_deploy] }
        aggregation_mode:
          { type: string, enum: [single, any_of, weighted, priority_order] }
        state_mapping_hash: { type: string }
        fallback_used: { type: boolean }
        warnings:
          type: array
          items: { type: string }

    InsightsOverview:
      type: object
      required:
        [
          resource_group,
          period,
          health_score,
          risk_level,
          drivers,
          execution,
          incident,
          recommendations,
          warnings,
          freshness,
          data_quality_warnings,
          calculation_context,
        ]
      properties:
        resource_group:
          $ref: "#/components/schemas/ResourceGroupRef"
        period:
          type: object
          required: [window_days, from, to]
          properties:
            window_days: { type: integer, minimum: 7, maximum: 180 }
            from: { type: string, format: date-time }
            to: { type: string, format: date-time }
        health_score: { type: integer, minimum: 0, maximum: 100 }
        risk_level:
          type: string
          enum: [low, watch, high, critical]
        drivers:
          type: array
          items: { type: string }
        execution:
          type: object
          required: [throughput_7d, throughput_30d, trend]
          properties:
            throughput_7d: { type: integer }
            throughput_30d: { type: integer }
            trend: { type: string, enum: [up, stable, down] }
        incident:
          type: object
          required:
            [
              incident_count_7d,
              incident_count_30d,
              mtta_p50_minutes,
              mttr_p50_hours,
              mttr_source,
            ]
          properties:
            incident_count_7d: { type: integer }
            incident_count_30d: { type: integer }
            mtta_p50_minutes: { type: number, nullable: true }
            mttr_p50_hours: { type: number, nullable: true }
            mttr_source: { type: string, enum: [incidents, not_configured] }
        recommendations:
          type: array
          items:
            type: object
            required: [type, priority, message]
            properties:
              type: { type: string }
              priority: { type: string, enum: [high, medium, low] }
              message: { type: string }
              context: { type: object, additionalProperties: true }
        warnings:
          type: array
          items: { type: string }
        freshness:
          type: object
          required: [snapshot_generated_at, snapshot_age_minutes, stale]
          properties:
            snapshot_generated_at:
              { type: string, nullable: true, format: date-time }
            snapshot_age_minutes: { type: integer, nullable: true }
            stale: { type: boolean }
        data_quality_warnings:
          type: array
          items: { type: string }
        calculation_context:
          $ref: "#/components/schemas/InsightsCalculationContext"

    IncidentInsights:
      type: object
      required:
        [
          resource_group,
          period,
          total_incidents,
          severity_distribution,
          hotspot_services,
          mtta_p50_minutes,
          mttr_p50_hours,
          warnings,
        ]
      properties:
        resource_group:
          $ref: "#/components/schemas/ResourceGroupRef"
        period: { type: string, description: YYYY-MM ou YYYY-Qn }
        period_window:
          type: object
          required: [from, to]
          properties:
            from: { type: string, format: date }
            to: { type: string, format: date }
        total_incidents: { type: integer }
        severity_distribution:
          type: array
          items:
            type: object
            required: [severity, count]
            properties:
              severity: { type: string }
              count: { type: integer }
        hotspot_services:
          type: array
          items:
            type: object
            required: [service, count]
            properties:
              service: { type: string }
              count: { type: integer }
        mtta_p50_minutes: { type: number, nullable: true }
        mttr_p50_hours: { type: number, nullable: true }
        warnings:
          type: array
          items: { type: string }

    PlanningConfidence:
      type: object
      required:
        [
          resource_group,
          period,
          planning_confidence,
          roadmap_confidence,
          epics,
          incident_correlation,
          warnings,
          calculation_context,
        ]
      properties:
        resource_group:
          $ref: "#/components/schemas/ResourceGroupRef"
        period: { type: string, description: YYYY-MM ou YYYY-Qn }
        planning_confidence:
          type: object
          required: [score, level, trend, drivers]
          properties:
            score: { type: integer, minimum: 0, maximum: 100 }
            level: { type: string, enum: [high, watch, low] }
            trend: { type: string, enum: [up, stable, down] }
            drivers:
              type: array
              items: { type: string }
        roadmap_confidence:
          type: object
          required: [score, trend, on_track_ratio, delayed_epics_count]
          properties:
            score: { type: integer, minimum: 0, maximum: 100 }
            trend: { type: string, enum: [up, stable, down] }
            on_track_ratio: { type: number, minimum: 0, maximum: 1 }
            delayed_epics_count: { type: integer }
        epics:
          type: array
          items:
            type: object
            required:
              [
                epic_id,
                epic_name,
                confidence_score,
                confidence_level,
                weeks_overdue,
                drivers,
              ]
            properties:
              epic_id: { type: string }
              epic_name: { type: string }
              confidence_score: { type: integer, minimum: 0, maximum: 100 }
              confidence_level: { type: string, enum: [high, watch, low] }
              weeks_overdue: { type: integer }
              drivers:
                type: array
                items: { type: string }
        incident_correlation:
          type: object
          required: [impacted_epics_count, roadmap_risk_due_to_incidents]
          properties:
            impacted_epics_count: { type: integer }
            roadmap_risk_due_to_incidents:
              { type: string, enum: [high, medium, low] }
        warnings:
          type: array
          items: { type: string }
        calculation_context:
          $ref: "#/components/schemas/InsightsCalculationContext"

    BacklogQuality:
      type: object
      required:
        [
          resource_group,
          backlog_quality,
          thresholds,
          warnings,
          calculation_context,
        ]
      properties:
        resource_group:
          $ref: "#/components/schemas/ResourceGroupRef"
        backlog_quality:
          type: object
          required:
            [
              score,
              level,
              backlog_aging_index_days,
              stale_backlog_rate,
              overdue_backlog_rate,
              flow_regression_rate,
              backlog_churn_proxy,
            ]
          properties:
            score: { type: integer, minimum: 0, maximum: 100 }
            level: { type: string, enum: [good, watch, alert] }
            backlog_aging_index_days: { type: number, nullable: true }
            stale_backlog_rate: { type: number, minimum: 0, maximum: 1 }
            overdue_backlog_rate: { type: number, minimum: 0, maximum: 1 }
            flow_regression_rate: { type: number, minimum: 0, maximum: 1 }
            backlog_churn_proxy: { type: number, minimum: 0, maximum: 1 }
        thresholds:
          type: object
          required: [stale_days]
          properties:
            stale_days: { type: integer }
        warnings:
          type: array
          items: { type: string }
        calculation_context:
          $ref: "#/components/schemas/InsightsCalculationContext"

    Trends:
      type: object
      required:
        [
          resource_group,
          window_days,
          granularity,
          series,
          anomalies,
          degradation_signals,
          warnings,
          calculation_context,
        ]
      properties:
        resource_group:
          $ref: "#/components/schemas/ResourceGroupRef"
        window_days: { type: integer }
        granularity: { type: string, enum: [daily, weekly] }
        series:
          type: object
          required: [throughput, incidents, confidence]
          properties:
            throughput:
              type: array
              items:
                type: object
                required: [bucket, value]
                properties:
                  bucket: { type: string }
                  value: { type: integer }
            incidents:
              type: array
              items:
                type: object
                required: [bucket, value]
                properties:
                  bucket: { type: string }
                  value: { type: integer }
            confidence:
              type: array
              items:
                type: object
                required: [bucket, value]
                properties:
                  bucket: { type: string }
                  value: { type: integer }
        anomalies:
          type: array
          items:
            type: object
            required: [metric_name, bucket, date, z_score, direction]
            properties:
              metric_name: { type: string }
              bucket: { type: string }
              date: { type: string }
              z_score: { type: number }
              direction: { type: string, enum: [spike, drop] }
        degradation_signals:
          type: array
          items:
            type: object
            required: [id, level, message]
            properties:
              id: { type: string }
              level: { type: string, enum: [high, medium, low] }
              message: { type: string }
        warnings:
          type: array
          items: { type: string }
        calculation_context:
          $ref: "#/components/schemas/InsightsCalculationContext"

    RecomputeAccepted:
      type: object
      required: [job_id, status, resource_group_id, submitted_at]
      properties:
        job_id: { type: string }
        status: { type: string, enum: [queued] }
        resource_group_id: { type: string, format: uuid }
        submitted_at: { type: string, format: date-time }

    CalculationPolicy:
      type: object
      required:
        [
          id,
          name,
          status,
          version,
          effective_from,
          effective_to,
          config,
          created_at,
          updated_at,
        ]
      properties:
        id: { type: string, format: uuid }
        name: { type: string }
        status: { type: string, enum: [draft, active, archived] }
        version: { type: integer, minimum: 1 }
        effective_from: { type: string, format: date-time, nullable: true }
        effective_to: { type: string, format: date-time, nullable: true }
        config: { type: object, additionalProperties: true }
        created_at: { type: string, format: date-time }
        updated_at: { type: string, format: date-time }

    CalculationPolicyResolved:
      type: object
      required: [resource_group_id, policy_source, policy]
      properties:
        resource_group_id: { type: string, format: uuid }
        policy_source:
          { type: string, enum: [resource_group, tenant_default, legacy] }
        policy:
          anyOf:
            - $ref: "#/components/schemas/CalculationPolicy"
            - type: "null"

    CalculationPolicyMappingCandidate:
      type: object
      required: [provider, source_type, match]
      properties:
        provider: { type: string, enum: [jira, github, manual] }
        source_type: { type: string }
        match: { type: string }

    CalculationPolicyMappingCandidates:
      type: object
      required: [resource_group_id, items, defaults]
      properties:
        resource_group_id: { type: string, format: uuid }
        items:
          type: array
          items:
            $ref: "#/components/schemas/CalculationPolicyMappingCandidate"
        defaults:
          type: object
          required: [task_statuses]
          properties:
            task_statuses:
              type: array
              items:
                type: string
                enum: [backlog, todo, in_progress, review, done, cancelled]

    CalculationPolicyHistoryItem:
      type: object
      required:
        [
          id,
          resource_group_id,
          name,
          status,
          version,
          effective_from,
          effective_to,
          created_by,
          updated_by,
          created_at,
          updated_at,
        ]
      properties:
        id: { type: string, format: uuid }
        resource_group_id: { type: string, format: uuid, nullable: true }
        name: { type: string }
        status: { type: string, enum: [draft, active, archived] }
        version: { type: integer, minimum: 1 }
        effective_from: { type: string, format: date-time, nullable: true }
        effective_to: { type: string, format: date-time, nullable: true }
        created_by: { type: string }
        updated_by: { type: string }
        created_at: { type: string, format: date-time }
        updated_at: { type: string, format: date-time }

    CalculationPolicyHistory:
      type: object
      required: [resource_group_id, items]
      properties:
        resource_group_id: { type: string, format: uuid }
        items:
          type: array
          items:
            $ref: "#/components/schemas/CalculationPolicyHistoryItem"

    SquadRef:
      type: object
      required: [id, key, name]
      properties:
        id: { type: string, format: uuid }
        key: { type: string }
        name: { type: string }

    SquadScopeVersion:
      type: object
      required: [id, name, version, status, config, created_at, updated_at]
      properties:
        id: { type: string, format: uuid }
        squad_id: { type: string, format: uuid }
        name: { type: string }
        version: { type: integer, minimum: 1 }
        status: { type: string, enum: [draft, active, archived] }
        config: { type: object, additionalProperties: true }
        created_at: { type: string, format: date-time }
        updated_at: { type: string, format: date-time }

    SquadScopeList:
      type: object
      required: [squad, items]
      properties:
        squad:
          $ref: "#/components/schemas/SquadRef"
        items:
          type: array
          items:
            $ref: "#/components/schemas/SquadScopeVersion"

    SquadClassifierVersion:
      type: object
      required:
        [
          id,
          key,
          applies_to_fact_type,
          version,
          status,
          config,
          created_at,
          updated_at,
        ]
      properties:
        id: { type: string, format: uuid }
        squad_id: { type: string, format: uuid }
        key: { type: string }
        applies_to_fact_type: { type: string }
        version: { type: integer, minimum: 1 }
        status: { type: string, enum: [draft, active, archived] }
        config: { type: object, additionalProperties: true }
        created_at: { type: string, format: date-time }
        updated_at: { type: string, format: date-time }

    SquadClassifierList:
      type: object
      required: [squad, items]
      properties:
        squad:
          $ref: "#/components/schemas/SquadRef"
        items:
          type: array
          items:
            $ref: "#/components/schemas/SquadClassifierVersion"

    MetricFormulaVersion:
      type: object
      required:
        [
          id,
          key,
          name,
          status,
          version,
          unit,
          window_days,
          created_at,
          updated_at,
          config,
        ]
      properties:
        id: { type: string, format: uuid }
        squad_id: { type: string, format: uuid }
        key: { type: string }
        name: { type: string }
        description: { type: string, nullable: true }
        status: { type: string, enum: [draft, active, archived] }
        version: { type: integer, minimum: 1 }
        unit: { type: string }
        window_days: { type: integer, minimum: 1, maximum: 365 }
        created_at: { type: string, format: date-time }
        updated_at: { type: string, format: date-time }
        config: { type: object, additionalProperties: true }

    MetricFormulaList:
      type: object
      required: [squad, items]
      properties:
        squad:
          $ref: "#/components/schemas/SquadRef"
        items:
          type: array
          items:
            $ref: "#/components/schemas/MetricFormulaVersion"

    MetricFormulaSimulationResult:
      type: object
      required: [squad_id, window_start, window_end, sample_row_count, result]
      properties:
        squad_id: { type: string, format: uuid }
        window_start: { type: string, format: date-time }
        window_end: { type: string, format: date-time }
        sample_row_count: { type: integer, minimum: 0 }
        result:
          type: object
          required: [key, name, unit, version, value]
          properties:
            key: { type: string }
            name: { type: string }
            unit: { type: string }
            version: { type: integer, minimum: 1 }
            value: { type: number }

    MaterializedInsightItem:
      type: object
      required:
        [
          id,
          metric_key,
          metric_name,
          formula_id,
          formula_version,
          value,
          unit,
          window_start,
          window_end,
          computed_at,
        ]
      properties:
        id: { type: string, format: uuid }
        metric_key: { type: string }
        metric_name: { type: string }
        formula_id: { type: string, format: uuid }
        formula_version: { type: integer, minimum: 1 }
        value: { type: number }
        unit: { type: string }
        window_start: { type: string, format: date-time }
        window_end: { type: string, format: date-time }
        computed_at: { type: string, format: date-time }

    MaterializedInsightList:
      type: object
      required: [squad, items]
      properties:
        squad:
          $ref: "#/components/schemas/SquadRef"
        items:
          type: array
          items:
            $ref: "#/components/schemas/MaterializedInsightItem"

    MaterializedInsightExplainability:
      type: object
      required:
        [
          id,
          squad_id,
          metric_key,
          metric_name,
          formula,
          value,
          unit,
          window_start,
          window_end,
          computed_at,
          explanation,
          source_summary,
          run,
        ]
      properties:
        id: { type: string, format: uuid }
        squad_id: { type: string, format: uuid }
        metric_key: { type: string }
        metric_name: { type: string }
        formula:
          type: object
          required: [id, key, name, version, config]
          properties:
            id: { type: string, format: uuid }
            key: { type: string }
            name: { type: string }
            version: { type: integer, minimum: 1 }
            config: { type: object, additionalProperties: true }
        value: { type: number }
        unit: { type: string }
        window_start: { type: string, format: date-time }
        window_end: { type: string, format: date-time }
        computed_at: { type: string, format: date-time }
        explanation:
          { type: object, additionalProperties: true, nullable: true }
        source_summary:
          { type: object, additionalProperties: true, nullable: true }
        run:
          anyOf:
            - type: object
              required:
                [
                  id,
                  status,
                  window_start,
                  window_end,
                  trigger_reason,
                  started_at,
                  finished_at,
                  input_summary,
                  result_summary,
                ]
              properties:
                id: { type: string, format: uuid }
                status:
                  { type: string, enum: [queued, running, success, failed] }
                window_start: { type: string, format: date-time }
                window_end: { type: string, format: date-time }
                trigger_reason: { type: string, nullable: true }
                started_at: { type: string, format: date-time, nullable: true }
                finished_at: { type: string, format: date-time, nullable: true }
                input_summary:
                  { type: object, additionalProperties: true, nullable: true }
                result_summary:
                  { type: object, additionalProperties: true, nullable: true }
            - type: "null"

    SquadRecomputeAccepted:
      type: object
      required:
        [
          squad_id,
          window_start,
          window_end,
          run_id,
          status,
          materialized_count,
          metric_keys,
        ]
      properties:
        squad_id: { type: string, format: uuid }
        window_start: { type: string, format: date-time }
        window_end: { type: string, format: date-time }
        run_id: { type: string, format: uuid }
        status: { type: string, enum: [success] }
        materialized_count: { type: integer, minimum: 0 }
        metric_keys:
          type: array
          items: { type: string }

    SquadRecomputeRun:
      type: object
      required:
        [
          id,
          squad_id,
          status,
          window_start,
          window_end,
          trigger_reason,
          started_at,
          finished_at,
          input_summary,
          result_summary,
          error_summary,
        ]
      properties:
        id: { type: string, format: uuid }
        squad_id: { type: string, format: uuid }
        status: { type: string, enum: [queued, running, success, failed] }
        window_start: { type: string, format: date-time }
        window_end: { type: string, format: date-time }
        trigger_reason: { type: string, nullable: true }
        started_at: { type: string, format: date-time, nullable: true }
        finished_at: { type: string, format: date-time, nullable: true }
        input_summary:
          { type: object, additionalProperties: true, nullable: true }
        result_summary:
          { type: object, additionalProperties: true, nullable: true }
        error_summary: { type: string, nullable: true }

paths:
  /insights/resource-groups/{group_id}/overview:
    get:
      tags: [Insights]
      summary: Overview operacional por Resource Group
      description: Retorna health score, drivers, throughput e resumo de incidentes do grupo.
      security: [{ BearerAuth: [] }]
      x-required-permission: insights.read
      parameters:
        - name: group_id
          in: path
          required: true
          schema: { type: string, format: uuid }
        - name: window_days
          in: query
          required: false
          schema: { type: integer, minimum: 7, maximum: 180, default: 30 }
      responses:
        "200":
          description: Overview calculado com sucesso
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/ApiResponse"
                  - properties:
                      data:
                        $ref: "#/components/schemas/InsightsOverview"
        "400":
          description: Parametros invalidos
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ApiError" }
        "401": { description: Nao autenticado }
        "403": { description: Sem permissao }
        "404": { description: Resource Group nao encontrado }

  /insights/resource-groups/{group_id}/incidents:
    get:
      tags: [Insights]
      summary: Insights de incidentes por Resource Group
      description: Retorna distribuicao de severidade, hotspots e MTTA/MTTR do grupo para o periodo.
      security: [{ BearerAuth: [] }]
      x-required-permission: insights.read
      parameters:
        - name: group_id
          in: path
          required: true
          schema: { type: string, format: uuid }
        - name: period
          in: query
          required: false
          schema:
            type: string
            pattern: '^(\\d{4}-(0[1-9]|1[0-2])|\\d{4}-Q[1-4])$'
            description: YYYY-MM ou YYYY-Qn
      responses:
        "200":
          description: Insights de incidentes retornados com sucesso
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/ApiResponse"
                  - properties:
                      data:
