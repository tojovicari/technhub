openapi: 3.0.3
info:
  title: CTO.ai Core API
  version: 1.0.0
  description: Tenant-scoped Core API for teams, projects, epics, and tasks.
servers:
  - url: /api/v1
security:
  - bearerAuth: []
tags:
  - name: Core
paths:
  /core/teams:
    post:
      tags: [Core]
      summary: Create team
      operationId: createTeam
      responses:
        '201':
          description: Created
      x-required-permissions:
        - core.team.manage

  /core/projects:
    post:
      tags: [Core]
      summary: Create project
      operationId: createProject
      responses:
        '201':
          description: Created
      x-required-permissions:
        - core.project.manage

  /core/projects/{project_id}:
    get:
      tags: [Core]
      summary: Get project by id
      operationId: getProject
      parameters:
        - in: path
          name: project_id
          required: true
          schema:
            type: string
      responses:
        '200':
          description: OK
        '401':
          description: Unauthorized
        '403':
          description: Forbidden
        '404':
          description: Not found
      x-required-permissions:
        - core.project.read

  /core/epics:
    post:
      tags: [Core]
      summary: Create epic
      operationId: createEpic
      responses:
        '201':
          description: Created
      x-required-permissions:
        - core.epic.manage

  /core/epics/{epic_id}:
    get:
      tags: [Core]
      summary: Get epic by id
      operationId: getEpic
      parameters:
        - in: path
          name: epic_id
          required: true
          schema:
            type: string
      responses:
        '200':
          description: OK
        '401':
          description: Unauthorized
        '403':
          description: Forbidden
        '404':
          description: Not found
      x-required-permissions:
        - core.epic.read

  /core/tasks:
    post:
      tags: [Core]
      summary: Create task
      operationId: createTask
      responses:
        '201':
          description: Created
      x-required-permissions:
        - core.task.write

  /core/tasks/{task_id}:
    get:
      tags: [Core]
      summary: Get task by id
      operationId: getTask
      parameters:
        - in: path
          name: task_id
          required: true
          schema:
            type: string
      responses:
        '200':
          description: OK
        '401':
          description: Unauthorized
        '403':
          description: Forbidden
        '404':
          description: Not found
      x-required-permissions:
        - core.task.read
    patch:
      tags: [Core]
      summary: Update task
      operationId: updateTask
      parameters:
        - in: path
          name: task_id
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Updated
        '401':
          description: Unauthorized
        '403':
          description: Forbidden
        '404':
          description: Not found
      x-required-permissions:
        - core.task.write

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
