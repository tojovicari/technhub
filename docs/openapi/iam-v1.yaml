openapi: 3.0.3
info:
  title: moasy.tech IAM API
  version: 1.0.0
  description: Tenant-scoped IAM for roles, permission profiles, and user assignments.
servers:
  - url: /api/v1
security:
  - bearerAuth: []
tags:
  - name: IAM
paths:
  /iam/permission-profiles:
    get:
      tags: [IAM]
      summary: List permission profiles for the tenant
      operationId: listPermissionProfiles
      parameters:
        - in: query
          name: is_active
          required: false
          schema:
            type: string
            enum: ["true", "false"]
          description: Filter by active status. Send the literal string 'true' or 'false'.
        - in: query
          name: is_system
          required: false
          schema:
            type: string
            enum: ["true", "false"]
          description: "Filter by system status. 'true' = built-in profiles only; 'false' = tenant-defined only."
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: object
                    required: [items]
                    properties:
                      items:
                        type: array
                        items:
                          $ref: "#/components/schemas/PermissionProfile"
                  meta:
                    $ref: "#/components/schemas/Meta"
                  error:
                    nullable: true
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "400":
          $ref: "#/components/responses/BadRequest"
    post:
      tags: [IAM]
      summary: Create permission profile
      operationId: createPermissionProfile
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreatePermissionProfileRequest"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PermissionProfileResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"

  /iam/permission-profiles/{profile_id}:
    get:
      tags: [IAM]
      summary: Get a single permission profile
      operationId: getPermissionProfile
      parameters:
        - in: path
          name: profile_id
          required: true
          schema:
            type: string
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PermissionProfileResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
    patch:
      tags: [IAM]
      summary: Update permission profile
      operationId: updatePermissionProfile
      parameters:
        - in: path
          name: profile_id
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdatePermissionProfileRequest"
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PermissionProfileResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
    delete:
      tags: [IAM]
      summary: Delete a permission profile
      operationId: deletePermissionProfile
      parameters:
        - in: path
          name: profile_id
          required: true
          schema:
            type: string
      responses:
        "204":
          description: Deleted
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"

  /iam/permission-profiles/{profile_id}/users:
    get:
      tags: [IAM]
      summary: List users assigned to a permission profile
      operationId: listProfileUsers
      parameters:
        - in: path
          name: profile_id
          required: true
          schema:
            type: string
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProfileUsersListResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"

  /iam/users/{user_id}/permission-profiles:
    get:
      tags: [IAM]
      summary: List user permission profile assignments
      operationId: listUserAssignments
      parameters:
        - in: path
          name: user_id
          required: true
          schema:
            type: string
        - in: query
          name: include_revoked
          required: false
          schema:
            type: string
            enum: ["true", "false"]
            default: "false"
          description: When 'true', includes revoked and expired assignments for audit history
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UserPermissionProfileListResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
    post:
      tags: [IAM]
      summary: Assign permission profile to user
      operationId: assignPermissionProfile
      parameters:
        - in: path
          name: user_id
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AssignPermissionProfileRequest"
      responses:
        "201":
          description: Assigned
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UserPermissionProfileResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"

  /iam/users/{user_id}/permission-profiles/{profile_id}:
    delete:
      tags: [IAM]
      summary: Revoke permission profile from user
      operationId: revokePermissionProfile
      parameters:
        - in: path
          name: user_id
          required: true
          schema:
            type: string
        - in: path
          name: profile_id
          required: true
          schema:
            type: string
      responses:
        "204":
          description: Revoked
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  responses:
    Unauthorized:
      description: Missing/invalid token
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
          example:
            data: null
            meta:
              request_id: req_unauth
              version: v1
              timestamp: "2026-04-08T12:00:00Z"
            error:
              code: UNAUTHORIZED
              message: Invalid or expired token
    Forbidden:
      description: Missing permission or tenant mismatch
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
          example:
            data: null
            meta:
              request_id: req_forbidden
              version: v1
              timestamp: "2026-04-08T12:00:00Z"
            error:
              code: FORBIDDEN
              message: You do not have permission for this resource
              details:
                required_permission: iam.permission_profile.assign

    BadRequest:
      description: Validation error
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
          example:
            data: null
            meta:
              request_id: req_400
              version: v1
              timestamp: "2026-04-08T12:00:00Z"
            error:
              code: BAD_REQUEST
              message: Invalid request body

    NotFound:
      description: Resource not found
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
          example:
            data: null
            meta:
              request_id: req_404
              version: v1
              timestamp: "2026-04-08T12:00:00Z"
            error:
              code: NOT_FOUND
              message: Resource not found

  schemas:
    Meta:
      type: object
      required: [request_id, version, timestamp]
      properties:
        request_id:
          type: string
        version:
          type: string
          example: v1
        timestamp:
          type: string
          format: date-time

    ErrorBody:
      type: object
      required: [code, message]
      properties:
        code:
          type: string
        message:
          type: string
        details:
          type: object
          additionalProperties: true

    ErrorResponse:
      type: object
      required: [data, meta, error]
      properties:
        data:
          nullable: true
        meta:
          $ref: "#/components/schemas/Meta"
        error:
          $ref: "#/components/schemas/ErrorBody"

    CreatePermissionProfileRequest:
      type: object
      required: [tenant_id, name, permission_keys]
      properties:
        tenant_id:
          type: string
        name:
          type: string
          minLength: 1
          maxLength: 100
        description:
          type: string
          maxLength: 500
        permission_keys:
          type: array
          minItems: 1
          items:
            type: string
            minLength: 1
        is_active:
          type: boolean
          default: true

    UpdatePermissionProfileRequest:
      type: object
      properties:
        name:
          type: string
          minLength: 1
          maxLength: 100
        description:
          type: string
          maxLength: 500
          nullable: true
        permission_keys:
          type: array
          minItems: 1
          items:
            type: string
            minLength: 1
        is_active:
          type: boolean

    PermissionProfile:
      type: object
      required:
        [
          id,
          tenant_id,
          name,
          permission_keys,
          is_system,
          is_active,
          created_at,
          updated_at,
        ]
      properties:
        id:
          type: string
        tenant_id:
          type: string
        name:
          type: string
        description:
          type: string
          nullable: true
        permission_keys:
          type: array
          items:
            type: string
        is_system:
          type: boolean
        is_active:
          type: boolean
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time

    PermissionProfileResponse:
      type: object
      required: [data, meta, error]
      properties:
        data:
          $ref: "#/components/schemas/PermissionProfile"
        meta:
          $ref: "#/components/schemas/Meta"
        error:
          nullable: true

    AssignPermissionProfileRequest:
      type: object
      required: [tenant_id, permission_profile_id]
      properties:
        tenant_id:
          type: string
          minLength: 1
        permission_profile_id:
          type: string
          minLength: 1
        expires_at:
          type: string
          format: date-time
          description: "Optional expiry; must be a valid ISO datetime and a future date. Returns 400 if invalid format or in the past."

    UserPermissionProfile:
      type: object
      required:
        [id, tenant_id, user_id, permission_profile_id, granted_by, granted_at]
      properties:
        id:
          type: string
        tenant_id:
          type: string
        user_id:
          type: string
        permission_profile_id:
          type: string
        granted_by:
          type: string
        granted_at:
          type: string
          format: date-time
        expires_at:
          type: string
          format: date-time
          nullable: true
        revoked_at:
          type: string
          format: date-time
          nullable: true

    UserPermissionProfileResponse:
      type: object
      required: [data, meta, error]
      properties:
        data:
          $ref: "#/components/schemas/UserPermissionProfile"
        meta:
          $ref: "#/components/schemas/Meta"
        error:
          nullable: true

    UserPermissionProfileListResponse:
      type: object
      required: [data, meta, error]
      properties:
        data:
          type: object
          required: [items]
          properties:
            items:
              type: array
              items:
                allOf:
                  - $ref: "#/components/schemas/UserPermissionProfile"
                  - type: object
                    properties:
                      profile:
                        $ref: "#/components/schemas/PermissionProfile"
        meta:
          $ref: "#/components/schemas/Meta"
        error:
          nullable: true

    ProfileUserAssignment:
      allOf:
        - $ref: "#/components/schemas/UserPermissionProfile"
        - type: object
          properties:
            account:
              type: object
              required: [id, email, full_name, role, is_active]
              properties:
                id:
                  type: string
                email:
                  type: string
                full_name:
                  type: string
                role:
                  type: string
                  enum: [org_admin, manager, viewer]
                is_active:
                  type: boolean

    ProfileUsersListResponse:
      type: object
      required: [data, meta, error]
      properties:
        data:
          type: object
          required: [items]
          properties:
            items:
              type: array
              items:
                $ref: "#/components/schemas/ProfileUserAssignment"
        meta:
          $ref: "#/components/schemas/Meta"
        error:
          nullable: true
